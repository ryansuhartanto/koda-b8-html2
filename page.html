    <h1>FumoFumo</h1>
    <p>
        FumoFumo (ふもふも), also known as Fumo or Fumos, are a line of plush toys manufactured and released by the company
        Gift. Originally designed by Nejikirio, it was named after the Japanese onomatopoeia "mofu mofu" (もふもふ) which is
        used to describe something fluffy or soft.
